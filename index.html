<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Calendário</title>

    <meta name="theme-color" content="#f472b6" />
    <meta
      name="description"
      content="Calendário elegante para marcar dias trabalhados e dias em casa."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Calendário" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Segoe UI",
          "Poppins",
          system-ui,
          -apple-system,
          "Inter",
          sans-serif;
      }

      :root {
        --bg: #0b1120;
        --card: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --muted: #c9d1e3;
        --primary: #f472b6;
        --work: #2dd4bf;
        --home: #fb923c;
        --border: rgba(255, 255, 255, 0.2);
        --shadow: rgba(0, 0, 0, 0.5);
        --glow: 0 0 12px rgba(244, 114, 182, 0.3);
        --accent-gradient: linear-gradient(135deg, #f9a8d4, #f472b6);
      }

      /* 🌸 TEMAS FEMININOS + luxo */
      body.theme-lavanda {
        --bg: #1e1a2f;
        --primary: #c084fc;
        --work: #6ee7b7;
        --home: #fbbf24;
        --accent-gradient: linear-gradient(135deg, #d8b4fe, #a78bfa);
      }

      body.theme-cereja {
        --bg: #2c0f1c;
        --primary: #f43f5e;
        --work: #facc15;
        --home: #fb923c;
        --accent-gradient: linear-gradient(135deg, #fda4af, #fb7185);
      }

      body.theme-mar-fofo {
        --bg: #0b2b2f;
        --primary: #2dd4bf;
        --work: #f472b6;
        --home: #fbbf24;
        --accent-gradient: linear-gradient(135deg, #5eead4, #2dd4bf);
      }

      body.theme-creme {
        --bg: #fefce8;
        --card: rgba(255, 245, 235, 0.85);
        --text: #3e2a47;
        --muted: #7c5e6e;
        --primary: #d9466b;
        --work: #0e7c6c;
        --home: #ea580c;
        --border: rgba(62, 42, 71, 0.2);
        --shadow: rgba(0, 0, 0, 0.08);
        --glow: 0 8px 20px rgba(217, 70, 107, 0.15);
      }

      body.theme-rose-glam {
        --bg: #2d1424;
        --primary: #ff99c8;
        --work: #b4f0a6;
        --home: #ffb347;
        --accent-gradient: linear-gradient(125deg, #ffb7d2, #ff85b3);
      }

      body.theme-perola {
        --bg: #f9f5ff;
        --card: rgba(255, 250, 240, 0.92);
        --text: #2e1e36;
        --muted: #8b7d9b;
        --primary: #b980ea;
        --work: #1b9e8b;
        --home: #e67e22;
        --border: rgba(46, 30, 54, 0.15);
      }

      body.theme-berry-sweet {
        --bg: #24112b;
        --primary: #e879f9;
        --work: #a3e635;
        --home: #f97316;
        --accent-gradient: linear-gradient(145deg, #f0abfc, #d946ef);
      }

      body.theme-neon-blue {
        --bg: #050816;
        --card: rgba(255, 255, 255, 0.08);
        --text: #ffffff;
        --muted: #94a3b8;
        --primary: #3b82f6;
        --work: #00d4ff;
        --home: #3b82f6;
        --border: rgba(0, 212, 255, 0.28);
        --shadow: rgba(0, 0, 0, 0.65);
        --glow: 0 0 22px rgba(0, 212, 255, 0.35);
        --accent-gradient: linear-gradient(135deg, #00d4ff, #3b82f6);
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            ellipse at 20% 30%,
            rgba(255, 192, 203, 0.15),
            transparent 50%
          ),
          radial-gradient(circle at 80% 70%, var(--primary), transparent 45%),
          linear-gradient(145deg, var(--bg), #030617);
        background-blend-mode: overlay;
        color: var(--text);
        padding: 20px;
        transition:
          background 0.5s ease,
          color 0.3s ease;
        overflow-x: hidden;
      }

      .app {
        width: 100%;
        max-width: 1100px;
        margin: auto;
        overflow-x: hidden;
      }

      /* 🌟 cartões flutuantes */
      .hero,
      .stat,
      .calendar-card {
        transition:
          transform 0.2s ease,
          box-shadow 0.3s;
      }

      .hero:hover,
      .calendar-card:hover {
        box-shadow:
          0 28px 55px var(--shadow),
          var(--glow);
      }

      .hero {
        padding: 26px;
        border-radius: 44px;
        background: var(--card);
        backdrop-filter: blur(22px);
        border: 1px solid var(--border);
        box-shadow: 0 20px 45px var(--shadow);
        margin-bottom: 24px;
        animation: floatIn 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
      }

      h1 {
        font-size: clamp(28px, 6vw, 48px);
        background: var(--accent-gradient);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.5px;
        font-weight: 800;
        margin-bottom: 6px;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      select,
      button,
      input,
      textarea {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(4px);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 60px;
        font-weight: 600;
        outline: none;
        transition: 0.2s;
        cursor: pointer;
      }

      body.theme-creme input,
      body.theme-creme select,
      body.theme-creme button,
      body.theme-creme textarea,
      body.theme-perola input,
      body.theme-perola select,
      body.theme-perola button,
      body.theme-perola textarea {
        background: rgba(255, 245, 240, 0.9);
        color: #3e2a47;
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--muted);
        font-weight: 400;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        resize: vertical;
        border-radius: 24px;
        margin-top: 18px;
        line-height: 1.4;
        cursor: text;
      }

      button:hover,
      select:hover {
        transform: translateY(-3px);
        filter: brightness(1.08);
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.25);
      }

      .primary-btn {
        background: var(--accent-gradient);
        color: white;
        border: none;
        font-weight: bold;
      }

      .install-btn {
        display: none;
      }

      .install-btn.show {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        margin-bottom: 28px;
      }

      .stat {
        background: var(--card);
        backdrop-filter: blur(20px);
        border-radius: 32px;
        padding: 20px 12px;
        text-align: center;
        border: 1px solid var(--border);
        transition: all 0.25s;
      }

      .stat span {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 500;
      }

      .stat strong {
        font-size: 38px;
        font-weight: 800;
        background: var(--accent-gradient);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        line-height: 1.2;
      }

      .calendar-card {
        background: var(--card);
        backdrop-filter: blur(24px);
        border-radius: 48px;
        padding: 24px;
        border: 1px solid var(--border);
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }

      .calendar-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }

      .month-title {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(145deg, var(--primary), white);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .weekdays {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
        width: 100%;
        min-width: 0;
      }

      .weekdays div {
        text-align: center;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.5px;
        padding: 8px;
        color: var(--primary);
      }

      .days {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 10px;
        width: 100%;
        min-width: 0;
      }

      .day {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(4px);
        border-radius: 28px;
        padding: 12px 6px;
        min-height: 100px;
        transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 240, 0.15);
        display: flex;
        flex-direction: column;
        position: relative;
        min-width: 0;
        overflow: hidden;
      }

      .day:hover {
        transform: translateY(-6px) scale(1.02);
        background: rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.3);
        border-color: var(--primary);
      }

      .number {
        font-weight: 800;
        font-size: 1.1rem;
        text-align: center;
        line-height: 1;
      }

      .status {
        display: block;
        margin-top: 10px;
        width: 30px;
        min-width: 30px;
        max-width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 50%;
        font-size: 16px;
        font-weight: 800;
        text-align: center;
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.2);
        letter-spacing: 0.3px;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 30px;
        align-self: center;
      }

      .note-preview {
        margin-top: 8px;
        padding: 7px 8px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.18);
        color: var(--text);
        font-size: 11px;
        line-height: 1.25;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .note-preview.empty-status {
        margin-top: auto;
      }

      .note-hint {
        position: absolute;
        top: 9px;
        right: 10px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--accent-gradient);
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.45);
        color: #fff;
        font-size: 14px;
        line-height: 26px;
        text-align: center;
        z-index: 2;
      }

      .day.has-note {
        border-color: var(--primary);
      }

      .day.work {
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--work) 55%, transparent),
          rgba(255, 215, 200, 0.1)
        );
        border-left: 4px solid var(--work);
      }
      .day.home {
        background: linear-gradient(
          145deg,
          color-mix(in srgb, var(--home) 55%, transparent),
          rgba(255, 215, 200, 0.1)
        );
        border-left: 4px solid var(--home);
      }

      .day.today {
        box-shadow:
          0 0 0 2px var(--primary),
          0 0 0 5px rgba(244, 114, 182, 0.3);
        background: radial-gradient(
          circle at 20% 30%,
          rgba(255, 215, 215, 0.2),
          transparent
        );
      }

      .legend {
        display: flex;
        gap: 24px;
        justify-content: center;
        margin-top: 28px;
        flex-wrap: wrap;
      }

      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
        box-shadow: 0 0 4px currentColor;
      }

      /* MODAL GLAM */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }

      .modal {
        width: 90%;
        max-width: 380px;
        background: rgba(15, 10, 25, 0.85);
        backdrop-filter: blur(32px);
        border-radius: 56px;
        padding: 28px 20px;
        border: 1px solid rgba(255, 255, 240, 0.5);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        animation: zoomFade 0.25s ease-out;
      }

      body.theme-creme .modal,
      body.theme-perola .modal {
        background: rgba(250, 240, 245, 0.95);
        color: #2e1e36;
      }

      .modal h2 {
        font-size: 28px;
        margin-bottom: 6px;
        font-weight: 800;
      }

      .modal-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
      }

      .work-btn,
      .home-btn,
      .clear-btn {
        border-radius: 60px;
        font-weight: bold;
        border: none;
        font-size: 1rem;
      }
      .work-btn {
        background: var(--work);
        color: #000;
      }
      .home-btn {
        background: var(--home);
        color: #000;
      }
      .clear-btn {
        background: rgba(220, 220, 240, 0.2);
        border: 1px solid var(--border);
      }

      @keyframes floatIn {
        0% {
          opacity: 0;
          transform: translateY(32px) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes zoomFade {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (max-width: 720px) {
        body {
          padding: 12px;
        }
        .hero {
          border-radius: 28px;
          padding: 18px;
        }
        .controls > * {
          width: 100%;
        }
        .stats {
          gap: 10px;
        }
        .calendar-card {
          border-radius: 28px;
          padding: 12px 10px;
        }
        .calendar-head {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .month-title {
          grid-column: 1 / -1;
          grid-row: 1;
          text-align: center;
        }
        .calendar-head button {
          grid-row: 2;
          min-width: 0;
          padding: 9px 8px;
          font-size: 12px;
          border-radius: 18px;
          white-space: normal;
        }
        .weekdays {
          gap: 3px;
        }
        .weekdays div {
          padding: 6px 0;
          font-size: 10px;
          letter-spacing: 0;
        }
        .days {
          gap: 3px;
        }
        .day {
          min-height: 64px;
          padding: 6px 2px;
          border-radius: 14px;
          border-left-width: 2px;
        }
        .day:hover {
          transform: none;
        }
        .number {
          font-size: 0.95rem;
        }
        .status {
          width: 22px;
          min-width: 22px;
          max-width: 22px;
          height: 22px;
          padding: 0;
          margin: 7px auto 0;
          border-radius: 50%;
          line-height: 22px;
          font-size: 12px;
        }
        .note-preview {
          display: none;
        }
        .note-hint {
          top: 4px;
          right: 4px;
          width: 20px;
          height: 20px;
          font-size: 11px;
          line-height: 20px;
        }
        .month-title {
          font-size: 20px;
        }
      }

      @media (max-width: 430px) {
        body {
          padding: 8px;
        }
        .calendar-card {
          padding: 10px 8px;
        }
        .days {
          gap: 3px;
        }
        .weekdays {
          gap: 3px;
        }
        .day {
          min-height: 56px;
          padding: 6px 2px;
          border-radius: 12px;
        }
        .number {
          font-size: 0.85rem;
        }
        .status {
          width: 18px;
          min-width: 18px;
          max-width: 18px;
          height: 18px;
          margin-top: 5px;
          line-height: 18px;
          font-size: 10px;
        }
        .note-preview {
          margin-top: 4px;
          padding: 3px 4px;
          font-size: 7px;
          line-height: 1.15;
        }
        .note-hint {
          top: 4px;
          right: 4px;
          width: 17px;
          height: 17px;
          font-size: 9px;
          line-height: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div class="top">
          <div>
            <h1 id="mainTitle">Calendário</h1>
            <p class="subtitle">
              Personalize seus dias de trabalho ou home office
            </p>
          </div>
        </div>
        <div class="controls">
          <input
            type="text"
            id="calendarWordInput"
            placeholder="Seu nome ou apelido"
            maxlength="24"
            autocomplete="off"
          />
          <input
            type="text"
            id="homeLabelInput"
            placeholder="Texto de dias em casa"
            maxlength="28"
            autocomplete="off"
          />
          <select id="themeSelect">
            <option value="theme-rose-glam">🌹 Rosa Glamour</option>
            <option value="theme-cereja">🍒 Cereja Doce</option>
            <option value="theme-lavanda">💜 Lavanda Sonho</option>
            <option value="theme-mar-fofo">🌊 Mar Fofo (água doce)</option>
            <option value="theme-berry-sweet">🍓 Berry Sweet</option>
            <option value="theme-creme">☁️ Creme Macio</option>
            <option value="theme-perola">🪷 Pérola Divina</option>
            <option value="theme-neon-blue">🔷 Neon Premium</option>
            <option value="theme-dark">✨ Azul Profundo</option>
          </select>
          <button class="primary-btn install-btn" id="installAppBtn">
            📲 Instalar app
          </button>
          <button class="primary-btn" id="clearMonthBtn">
            🗑️ Limpar este mês
          </button>
        </div>
      </section>

      <section class="stats">
        <div class="stat">
          <span>💼 Dias trabalhados</span><strong id="workCount">0</strong>
        </div>
        <div class="stat">
          <span id="homeStatLabel">Dias em casa</span><strong id="homeCount">0</strong>
        </div>
      </section>

      <section class="calendar-card">
        <div class="calendar-head">
          <button id="prevMonthBtn" class="primary-btn">◀ Mês anterior</button>
          <div class="month-title" id="monthTitle"></div>
          <button id="nextMonthBtn" class="primary-btn">Próximo mês ▶</button>
        </div>
        <div class="weekdays">
          <div>DOM</div>
          <div>SEG</div>
          <div>TER</div>
          <div>QUA</div>
          <div>QUI</div>
          <div>SEX</div>
          <div>SÁB</div>
        </div>
        <div class="days" id="daysGrid"></div>
        <div class="legend">
          <span
            ><i
              class="dot"
              style="background: var(--work); box-shadow: 0 0 4px var(--work)"
            ></i>
            Trabalhou</span
          >
          <span><i class="dot" style="background: var(--home)"></i> <span id="homeLegendLabel">Ficou em casa</span></span>
          <span
            ><i class="dot" style="background: var(--primary)"></i> Hoje</span
          >
        </div>
      </section>
    </main>

    <div class="modal-bg" id="modalOverlay">
      <div class="modal">
        <h2 id="modalDateLabel">Marcar dia</h2>
        <p id="modalDesc">Escolha uma opção para esse dia</p>
        <textarea
          id="modalNoteInput"
          maxlength="240"
          placeholder="Escreva uma anotação para esta data..."
        ></textarea>
        <div class="modal-actions">
          <button class="work-btn" id="modalWorkBtn">💼 Trabalhou</button>
          <button class="home-btn" id="modalHomeBtn">🏠 Em casa</button>
          <button class="primary-btn" id="modalSaveNoteBtn">
            💾 Salvar anotação
          </button>
          <button class="clear-btn" id="modalClearBtn">
            🧽 Limpar marcação
          </button>
        </div>
      </div>
    </div>

    <script>
      // ---------------------- DATA STATE -------------------------
      let currentDisplayDate = new Date(); // ano/mês de referência
      let selectedGlobalKey = null;
      let selectedDayNumber = null;

      const monthsNames = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho",
        "Julho",
        "Agosto",
        "Setembro",
        "Outubro",
        "Novembro",
        "Dezembro",
      ];
      const daysGrid = document.getElementById("daysGrid");
      const monthTitleSpan = document.getElementById("monthTitle");
      const calendarWordInput = document.getElementById("calendarWordInput");
      const homeLabelInput = document.getElementById("homeLabelInput");
      const mainTitle = document.getElementById("mainTitle");
      const themeSelect = document.getElementById("themeSelect");
      const installAppBtn = document.getElementById("installAppBtn");
      const homeStatLabel = document.getElementById("homeStatLabel");
      const homeLegendLabel = document.getElementById("homeLegendLabel");
      const modalHomeBtn = document.getElementById("modalHomeBtn");
      let deferredInstallPrompt = null;

      // helpers storage
      function getStorage() {
        const raw = localStorage.getItem("tati_calendar_plus");
        return raw ? JSON.parse(raw) : {};
      }
      function saveStorage(data) {
        localStorage.setItem("tati_calendar_plus", JSON.stringify(data));
      }

      function getDateKey(year, monthIdx, day) {
        return `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      }

      function getDayData(value) {
        if (!value) return { status: "", note: "" };
        if (typeof value === "string") return { status: value, note: "" };
        return {
          status: value.status || "",
          note: value.note || "",
        };
      }

      function escapeHTML(text) {
        return text.replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[char],
        );
      }

      // atualizar contadores (apenas work e home, sem total)
      function updateStats() {
        const data = getStorage();
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        let work = 0,
          home = 0;
        for (const [key, val] of Object.entries(data)) {
          const [y, m] = key.split("-").map(Number);
          if (y === year && m === month + 1) {
            const dayData = getDayData(val);
            if (dayData.status === "work") work++;
            else if (dayData.status === "home") home++;
          }
        }
        document.getElementById("workCount").innerText = work;
        document.getElementById("homeCount").innerText = home;
      }

      // render calendário completo com efeitos
      function renderCalendar() {
        daysGrid.innerHTML = "";
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const firstDayOfMonth = new Date(year, month, 1).getDay(); // 0 domingo
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const storageData = getStorage();
        const today = new Date();
        const homeText = getHomeLabel();

        // preencher células vazias antes do dia 1
        for (let i = 0; i < firstDayOfMonth; i++) {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "day empty";
          emptyDiv.style.opacity = "0.4";
          emptyDiv.style.cursor = "default";
          emptyDiv.style.background = "transparent";
          daysGrid.appendChild(emptyDiv);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const key = getDateKey(year, month, d);
          const dayData = getDayData(storageData[key]);
          const status = dayData.status;
          const note = dayData.note.trim();
          const dayDiv = document.createElement("div");
          dayDiv.className = `day ${status}`;
          if (note) dayDiv.classList.add("has-note");

          // indicador de hoje
          if (
            today.getFullYear() === year &&
            today.getMonth() === month &&
            today.getDate() === d
          ) {
            dayDiv.classList.add("today");
          }

          // conteúdo
          dayDiv.innerHTML = `
          <div class="number">${d}</div>
          ${note ? '<div class="note-hint" title="Tem anotação">📝</div>' : ""}
          ${status ? `<div class="status" title="${status === "work" ? "Trabalhou" : escapeHTML(homeText)}" aria-label="${status === "work" ? "Trabalhou" : escapeHTML(homeText)}">${status === "work" ? "💼" : "🏡"}</div>` : ""}
          ${note ? `<div class="note-preview ${status ? "" : "empty-status"}">${escapeHTML(note)}</div>` : ""}
        `;

          dayDiv.addEventListener(
            "click",
            (function (dd, k) {
              return function () {
                selectedGlobalKey = k;
                selectedDayNumber = dd;
                openModal(dd);
              };
            })(d, key),
          );

          daysGrid.appendChild(dayDiv);
        }

        monthTitleSpan.innerText = `${monthsNames[month]} ${year}`;
        updateStats();
      }

      // Modal feminino e interativo
      const modalBg = document.getElementById("modalOverlay");
      const modalDateLabel = document.getElementById("modalDateLabel");
      const modalDesc = document.getElementById("modalDesc");
      const modalNoteInput = document.getElementById("modalNoteInput");
      let noteSaveTimer = null;

      function openModal(dayNum) {
        if (!selectedGlobalKey) return;
        const monthName = monthsNames[currentDisplayDate.getMonth()];
        const dayData = getDayData(getStorage()[selectedGlobalKey]);
        modalDateLabel.innerText = `Dia ${dayNum} de ${monthName}`;
        const nome = getCalendarWord();
        modalDesc.innerHTML = nome && nome !== "Calendário"
          ? `O que ${nome} fez nesse dia?`
          : "O que aconteceu nesse dia?";
        modalNoteInput.value = dayData.note;
        modalBg.style.display = "flex";
      }

      function closeModalViaBg(e) {
        if (e.target === modalBg) {
          saveCurrentNote(false);
          modalBg.style.display = "none";
          renderCalendar();
        }
      }

      function saveCurrentNote(shouldRender) {
        if (!selectedGlobalKey) return;
        const data = getStorage();
        const dayData = getDayData(data[selectedGlobalKey]);
        const note = modalNoteInput.value.trim();

        if (!dayData.status && !note) {
          delete data[selectedGlobalKey];
        } else {
          data[selectedGlobalKey] = { status: dayData.status, note };
        }

        saveStorage(data);
        if (shouldRender) renderCalendar();
      }

      function setStatusAndClose(statusType) {
        if (!selectedGlobalKey) {
          modalBg.style.display = "none";
          return;
        }
        const data = getStorage();
        const note = modalNoteInput.value.trim();
        if (statusType === "") {
          clearTimeout(noteSaveTimer);
          modalNoteInput.value = "";
          delete data[selectedGlobalKey];
        } else {
          data[selectedGlobalKey] = { status: statusType, note };
        }
        saveStorage(data);
        modalBg.style.display = "none";
        renderCalendar();
      }

      modalNoteInput.addEventListener("input", () => {
        clearTimeout(noteSaveTimer);
        noteSaveTimer = setTimeout(() => saveCurrentNote(true), 250);
      });

      function saveNoteAndClose() {
        if (!selectedGlobalKey) {
          modalBg.style.display = "none";
          return;
        }
        const data = getStorage();
        const dayData = getDayData(data[selectedGlobalKey]);
        const note = modalNoteInput.value.trim();

        if (!dayData.status && !note) {
          delete data[selectedGlobalKey];
        } else {
          data[selectedGlobalKey] = { status: dayData.status, note };
        }

        saveStorage(data);
        modalBg.style.display = "none";
        renderCalendar();
      }

      // navegação mês
      function changeMonth(delta) {
        const newDate = new Date(
          currentDisplayDate.getFullYear(),
          currentDisplayDate.getMonth() + delta,
          1,
        );
        currentDisplayDate = newDate;
        renderCalendar();
      }

      function clearCurrentMonth() {
        const confirmMsg = `Tem certeza que deseja apagar todas as marcações de ${monthsNames[currentDisplayDate.getMonth()]} ${currentDisplayDate.getFullYear()}?`;
        if (!confirm(confirmMsg)) return;
        const data = getStorage();
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth() + 1;
        const newData = {};
        for (const [key, val] of Object.entries(data)) {
          const [y, m] = key.split("-").map(Number);
          if (!(y === year && m === month)) {
            newData[key] = val;
          }
        }
        saveStorage(newData);
        renderCalendar();
      }

      // ----- Temas com personalização e armazenamento -------------
      function getCalendarWord() {
        return calendarWordInput.value.trim() || "Calendário";
      }

      function getHomeLabel() {
        return homeLabelInput.value.trim() || "Dias em casa";
      }

      function applyTheme(themeValue) {
        document.body.classList = "";
        if (themeValue !== "theme-dark") {
          document.body.classList.add(themeValue);
        }
        updatePersonalization();
      }

      function updatePersonalization() {
        const titleText = getCalendarWord();

        mainTitle.innerText = titleText;
        document.title = titleText;
        homeStatLabel.innerText = getHomeLabel();
        homeLegendLabel.innerText = getHomeLabel();
        modalHomeBtn.innerText = getHomeLabel();

        localStorage.setItem("calendarWord", titleText);
        localStorage.setItem("homeLabel", getHomeLabel());
      }

      calendarWordInput.addEventListener("input", () => {
        updatePersonalization();
        renderCalendar();
      });
      homeLabelInput.addEventListener("input", updatePersonalization);

      // load initial name, labels & theme
      const savedCalendarWord = localStorage.getItem("calendarWord");
      const savedHomeLabel = localStorage.getItem("homeLabel");
      const savedName = localStorage.getItem("calendarUserName");

      calendarWordInput.value =
        savedName && savedName !== "Tati" ? savedName : savedCalendarWord || "Calendário";
      homeLabelInput.value = savedHomeLabel || "Dias em casa";
      localStorage.removeItem("calendarIcon");
      localStorage.removeItem("calendarUserName");
      updatePersonalization();

      const savedTheme = localStorage.getItem("calendarThemeFem");
      if (savedTheme) {
        themeSelect.value = savedTheme;
        applyTheme(savedTheme);
      } else {
        applyTheme("theme-rose-glam");
        themeSelect.value = "theme-rose-glam";
      }

      themeSelect.addEventListener("change", (e) => {
        applyTheme(e.target.value);
        localStorage.setItem("calendarThemeFem", e.target.value);
      });

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installAppBtn.classList.add("show");
      });

      installAppBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installAppBtn.classList.remove("show");
      });

      window.addEventListener("appinstalled", () => {
        deferredInstallPrompt = null;
        installAppBtn.classList.remove("show");
      });

      // eventos botões
      document
        .getElementById("prevMonthBtn")
        .addEventListener("click", () => changeMonth(-1));
      document
        .getElementById("nextMonthBtn")
        .addEventListener("click", () => changeMonth(1));
      document
        .getElementById("clearMonthBtn")
        .addEventListener("click", clearCurrentMonth);

      // modal actions
      document
        .getElementById("modalWorkBtn")
        .addEventListener("click", () => setStatusAndClose("work"));
      document
        .getElementById("modalHomeBtn")
        .addEventListener("click", () => setStatusAndClose("home"));
      document
        .getElementById("modalSaveNoteBtn")
        .addEventListener("click", saveNoteAndClose);
      document
        .getElementById("modalClearBtn")
        .addEventListener("click", () => setStatusAndClose(""));
      modalBg.addEventListener("click", closeModalViaBg);

      // animacao inicial + render
      renderCalendar();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./service-worker.js")
            .catch((error) =>
              console.log("Erro ao registrar Service Worker:", error),
            );
        });
      }
    </script>
  </body>
</html>
